<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
    <link rel="stylesheet" href="styleQN.css">
</head>
<body>
    <header>
        <h1>Quick Notes</h1>
    </header>

    <main>
        <div id="DivFormulario">
            <form>
                <h2>Adicione Uma Nota</h2>

                <h3>Título</h3>
                <input type="text" id="inputTitulo" required placeholder ="Digite o título da nota">
                <h3>Conteúdo</h3>
                <textarea name="" id="inputTexto" required placeholder="Digite o conteúdo da sua nota aqui..."></textarea>
                <br><br>
                <button type="reset" onclick="AdicionarNota()">Criar Nota</button>

            </form>
        </div>

        <div id="DivNotas">
            <h2>Notas Criadas</h2>

            <div id="DivNotas2">

            </div>

        </div>
    </main>




    <script src="scriptQN.js"></script>
</body>
</html>
